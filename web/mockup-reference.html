  /* ---------- page chrome ---------- */
  :root { --pg-bg:#EFEBE3; --pg-ink:#2B211F; --pg-soft:#6E625B; --pg-line:#D8D0C2; --pg-accent:#722F44; }
  @media (prefers-color-scheme: dark) { :root { --pg-bg:#14100D; --pg-ink:#F1E9E1; --pg-soft:#A2958C; --pg-line:#352C27; --pg-accent:#D08FA1; } }
  :root[data-theme="dark"] { --pg-bg:#14100D; --pg-ink:#F1E9E1; --pg-soft:#A2958C; --pg-line:#352C27; --pg-accent:#D08FA1; }
  :root[data-theme="light"] { --pg-bg:#EFEBE3; --pg-ink:#2B211F; --pg-soft:#6E625B; --pg-line:#D8D0C2; --pg-accent:#722F44; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--pg-bg); color:var(--pg-ink); font-family:system-ui,-apple-system,sans-serif; padding:26px 14px 70px; line-height:1.5; }
  .pg-head { max-width:900px; margin:0 auto; text-align:center; }
  .pg-head h1 { font-size:19px; margin:0; }
  .pg-head p { margin:4px 0 0; color:var(--pg-soft); font-size:13px; }
  .map { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:820px; margin:14px auto 20px; }
  .map button { font:inherit; font-size:12px; font-weight:600; color:var(--pg-soft); background:transparent; border:1px solid var(--pg-line); border-radius:999px; padding:6px 12px; cursor:pointer; }
  .map button.on { color:var(--pg-accent); border-color:var(--pg-accent); }
  .map .util { color:var(--pg-ink); }
  .stage { display:flex; justify-content:center; }
  .phoneframe { width:396px; max-width:calc(100vw - 20px); height:800px; border-radius:40px; padding:10px; background:#0d0b0a; box-shadow:0 30px 70px -30px rgba(0,0,0,.55); }
  .phoneframe .scr { width:100%; height:100%; border-radius:31px; overflow:hidden; position:relative; }
  .webframe { width:min(1150px, calc(100vw - 20px)); height:790px; border-radius:16px; background:#0d0b0a; padding:8px; box-shadow:0 30px 70px -30px rgba(0,0,0,.55); display:flex; flex-direction:column; }
  .webframe .bar { display:flex; align-items:center; gap:8px; padding:6px 10px 10px; }
  .webframe .bar i { width:10px; height:10px; border-radius:50%; background:#4a4442; }
  .webframe .bar .url { margin-left:8px; flex:1; max-width:420px; background:#211d1b; color:#a89e96; border-radius:8px; font-size:11.5px; padding:5px 12px; text-align:center; }
  .webframe .scr { flex:1; border-radius:10px; overflow:hidden; position:relative; }

  /* ---------- app tokens (B skeleton · A skin) ---------- */
  .app {
    --bg:#F6F2E9; --card:#FCFAF4; --ink:#2A2118; --soft:#75685A; --faint:#A2937F;
    --line:#E3DAC8; --hair:#EAE2D2; --wine:#722F44; --winesoft:#9D6A79; --tint:#F0E2E6;
    --live:#47795D; --livebg:#E4EFE7; --amber:#9C6B22; --amberbg:#F3E7D2; --onwine:#FFF;
  }
  :root[data-theme="dark"] .app {
    --bg:#191411; --card:#221C17; --ink:#EFE6D8; --soft:#A79987; --faint:#776A5A;
    --line:#372E26; --hair:#2C251F; --wine:#D08FA1; --winesoft:#96707D; --tint:#33222A;
    --live:#8FC8A5; --livebg:#20332A; --amber:#D9AA61; --amberbg:#33280F; --onwine:#241318;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .app {
      --bg:#191411; --card:#221C17; --ink:#EFE6D8; --soft:#A79987; --faint:#776A5A;
      --line:#372E26; --hair:#2C251F; --wine:#D08FA1; --winesoft:#96707D; --tint:#33222A;
      --live:#8FC8A5; --livebg:#20332A; --amber:#D9AA61; --amberbg:#33280F; --onwine:#241318;
    }
  }
  .app { position:absolute; inset:0; background:var(--bg); color:var(--ink); font-family:system-ui,-apple-system,sans-serif; font-size:17px; overflow-y:auto; scrollbar-width:none; }
  .app::-webkit-scrollbar { display:none; }
  .pad { padding:20px 18px 110px; }
  .serif { font-family:Marcellus, serif; font-weight:400; }
  .num { font-variant-numeric: tabular-nums; }
  button { font:inherit; color:inherit; cursor:pointer; }

  /* wordmark + header */
  .brandrow { display:flex; align-items:center; gap:10px; }
  .brandrow .wm { line-height:1.05; }
  .brandrow .wm .house { display:block; font-family:Marcellus,serif; font-size:10.5px; letter-spacing:.3em; color:var(--soft); }
  .brandrow .wm .helper { display:block; font-family:Marcellus,serif; font-size:19px; font-weight:700; letter-spacing:.02em; }
  .brandrow .gear { margin-left:auto; width:40px; height:40px; border-radius:50%; color:var(--soft); font-size:16px; display:grid; place-items:center; border:1px solid var(--line); background:var(--card); }
  .locline { margin-top:10px; }
  .locline button { display:inline-flex; align-items:center; gap:6px; background:none; border:none; padding:0; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--faint); }
  .locline button b { color:var(--soft); font-weight:600; }

  /* month header */
  .monthrow { display:flex; align-items:baseline; gap:10px; margin:16px 0 0; }
  .monthrow .m { font-family:Marcellus,serif; font-size:37px; font-weight:700; letter-spacing:.01em; }
  .monthrow .y { font-family:Marcellus,serif; font-size:15px; font-weight:400; color:var(--soft); letter-spacing:.14em; }
  .monthrow .tools { margin-left:auto; display:flex; gap:6px; }
  .monthrow .tools button { width:38px; height:38px; border-radius:50%; border:1px solid var(--line); background:var(--card); color:var(--soft); font-family:Marcellus,serif; font-size:17px; }
  .monthrow .tools button.calbtn { width:auto; padding:0 16px; font-size:15px; }
  .monthrow .tools button:hover:not(:disabled) { color:var(--wine); border-color:var(--winesoft); }
  .monthrow .tools button:disabled { opacity:.35; cursor:default; }
  .horizon { font-size:11px; color:var(--faint); margin:6px 2px 0; }

  .calbtn { height:38px; border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--soft); font-family:Marcellus,serif; font-size:15px; padding:0 16px; }
  .calbtn:hover { color:var(--wine); border-color:var(--winesoft); }
  .sheethead { display:flex; align-items:center; gap:10px; margin-top:14px; }
  .sheethead .sheetlbl { margin:0; flex:1; min-width:0; }
  .freshpill { flex:none; font-size:12px; font-weight:700; color:var(--live); background:var(--livebg); border:1px solid color-mix(in srgb, var(--live) 30%, transparent); border-radius:999px; padding:5px 11px; white-space:nowrap; }
  .freshpill.checking { color:var(--soft); background:var(--card); border-color:var(--line); }
  .selectwrap { position:relative; }
  .selectwrap select { width:100%; appearance:none; -webkit-appearance:none; font:inherit; font-size:15.5px; font-weight:600; color:var(--ink); background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 38px 13px 15px; cursor:pointer; }
  .selectwrap::after { content:"▾"; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--faint); pointer-events:none; }
  .daychips { display:flex; gap:7px; flex-wrap:wrap; }
  .daychips .dch { min-width:44px; min-height:48px; flex:1; border:1px solid var(--line); background:var(--card); border-radius:12px; font-size:14px; font-weight:600; color:var(--ink); }
  .daychips .dch.on { background:var(--wine); border-color:var(--wine); color:var(--onwine); }
  /* choice sentence */
  .choice { margin:14px 0 0; }

    app.querySelectorAll("[data-go]").forEach(function(b){ b.addEventListener("click",function(e){ e.stopPropagation(); go(b.getAttribute("data-go")); }); });
    app.querySelectorAll("[data-day]").forEach(function(b){ b.addEventListener("click",function(){ S.selBy[S.m]=Number(b.getAttribute("data-day")); freshCheck(); }); });
    app.querySelectorAll("[data-pick]").forEach(function(b){ b.addEventListener("click",function(){ S.selBy[S.m]=Number(b.getAttribute("data-pick")); S.view="home"; freshCheck(); }); });
    app.querySelectorAll("[data-time]").forEach(function(b){ b.addEventListener("click",function(){
      S.time=b.getAttribute("data-time");
      var row=rowAt(S.m,sel(),S.time);
      S.timeProvs=row?row[1]:null;
      S.verified=false; S.steps={}; go("card");
    }); });
    var catSel=document.getElementById("catSel");
    if(catSel) catSel.addEventListener("change",function(){
      S.cat=catSel.value; S.fam=CAT.families.findIndex(function(f){return !f.couples&&f.cat===S.cat;});
      if(famLengths().indexOf(S.len)<0) S.len=famLengths().indexOf(80)>=0?80:famLengths()[0];
      render();
    });
    app.querySelectorAll("[data-set]").forEach(function(b){ b.addEventListener("click",function(){
      var kv=b.getAttribute("data-set").split(":"), k=kv[0], v=kv[1];
      if(k==="who"){
        S.who=v;
        if(v==="two"){ S.fam=CAT.families.findIndex(function(f){return f.couples;}); }
        else { S.fam=CAT.families.findIndex(function(f){return f.name==="Seasonal Swedish Massage";}); S.cat="Massage"; }
      } else if(k==="cat"){
        S.cat=v; S.fam=CAT.families.findIndex(function(f){return !f.couples&&f.cat===v;});
      } else if(k==="fam"){ S.fam=Number(v); }
      else if(k==="len"){ S.len=Number(v); }
      else S[k]=v;
      if(famLengths().indexOf(S.len)<0) S.len=famLengths().indexOf(80)>=0?80:famLengths()[0];
      render();
    }); });
    app.querySelectorAll("[data-step]").forEach(function(b){ b.addEventListener("click",function(){ var i=b.getAttribute("data-step"); S.steps[i]=!S.steps[i]; render(); }); });
    app.querySelectorAll("[data-copy]").forEach(function(b){ b.addEventListener("click",function(){
      var v=b.getAttribute("data-copy");
      var done=function(){ b.classList.add("copied"); b.querySelector(".cp").textContent="✓ Copied"; toast("Copied · "+v);
        setTimeout(function(){ b.classList.remove("copied"); b.querySelector(".cp").textContent="Copy"; },1500); };
      if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(v).then(done,done); else done();
    }); });
    app.querySelectorAll("[data-aday]").forEach(function(b){ b.addEventListener("click",function(){
      var v=b.getAttribute("data-aday");
      if(v==="any") S.adays=[];
      else { var i=Number(v), at=S.adays.indexOf(i); if(at>=0) S.adays.splice(at,1); else S.adays.push(i); }
      render();
    }); });
    app.querySelectorAll("[data-atod]").forEach(function(b){ b.addEventListener("click",function(){
      var v=b.getAttribute("data-atod");
      if(v==="Any") S.atod=[];
      else { var at=S.atod.indexOf(v); if(at>=0) S.atod.splice(at,1); else S.atod.push(v); }
      render();
    }); });
    app.querySelectorAll("[data-delalert]").forEach(function(b){ b.addEventListener("click",function(){ S.alerts.splice(Number(b.getAttribute("data-delalert")),1); render(); toast("Alert removed"); }); });
    app.querySelectorAll("[data-loc]").forEach(function(b){ b.addEventListener("click",function(){
      LOCS.forEach(function(l){delete l.on;}); LOCS[Number(b.getAttribute("data-loc"))].on=true; toast("Spa changed · the calendar reloads for it"); go("home");
    }); });
    app.querySelectorAll("[data-act]").forEach(function(b){ b.addEventListener("click",function(){
      var a=b.getAttribute("data-act");
      if(a==="monthview") go("month");
      if(a==="editfromalert"){ S.returnTo="alert"; go("filters"); }
      if(a==="prevm"&&S.m>0){ S.m--; render(); }
      if(a==="nextm"&&S.m<MONTHS.length-1){ S.m++; render(); }
      if(a==="refresh"){ b.innerHTML=icon("refresh")+"Checking…"; setTimeout(function(){ toast("Checked just now"); render(); },900); }
      if(a==="apply"){ var back=S.returnTo||"home"; S.returnTo=null; go(back); toast(back==="alert"?"Alert updated":"Showing "+sentence()); }
      if(a==="recheck"){ b.textContent="Checking…"; setTimeout(function(){ S.verified=true; render(); toast("Still open · "+(S.time||"2:00 PM")+" is free"); },900); }
      if(a==="minimize"){ S.strip=true; go("home"); }
      if(a==="alertsend"){ var e=document.getElementById("alertEmail"); S.alertEmail=e&&e.value?e.value:"you@example.com"; S.alertStage="inbox"; render(); }
      if(a==="alertconfirm"){ S.alertStage="confirmed"; S.alerts.push({f:watchPhrase(),l:"Grand Rapids"}); render(); }
      if(a==="savepf"){ S.profile={name:val("pfName"),email:val("pfEmail")}; toast("Saved on this device"); go(S.time?"card":"settings"); }
      if(a==="stale"){ S.stale=!S.stale; go("home"); }
      if(a==="call"){ toast("Calls the spa · on a real phone this dials (616) 555-0148"); }
    }); });
    var agree=document.getElementById("agree");
    if(agree) agree.addEventListener("change",function(){ S.terms=agree.checked; render(); });
    var openWh=document.getElementById("openWh");
    if(openWh) openWh.addEventListener("click",function(){ if(!openWh.disabled) toast("Opens Woodhouse’s real booking site in a new tab"); });
    var strip=document.getElementById("strip");
    if(strip) strip.addEventListener("click",function(e){ if(e.target.id==="stripX"){ S.strip=false; render(); toast("Saved time dismissed"); } else go("card"); });
    dragScroll(app.querySelector(".ribbon"));
    var seg=document.getElementById("themeSeg");
    if(seg) seg.querySelectorAll("[data-thm]").forEach(function(b){ b.addEventListener("click",function(){
      seg.querySelectorAll("button").forEach(function(x){x.classList.remove("on");}); b.classList.add("on");
      var t=b.getAttribute("data-thm");
      if(t==="auto") delete document.documentElement.dataset.theme; else document.documentElement.dataset.theme=t;
    }); });
  }
  function val(id){ var e=document.getElementById(id); return e?e.value.trim():""; }
  // mouse users can drag the date row (touch scrolls natively)
  function dragScroll(el){
    if(!el) return;
    var down=false,sx=0,sl=0;
    el.addEventListener("mousedown",function(e){ down=true; sx=e.pageX; sl=el.scrollLeft; });
    window.addEventListener("mousemove",function(e){ if(down){ el.scrollLeft=sl-(e.pageX-sx); } });
    window.addEventListener("mouseup",function(){ down=false; });
    el.addEventListener("wheel",function(e){ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ el.scrollLeft+=e.deltaY; e.preventDefault(); } },{passive:false});
  }

  /* screen map + mode/theme toggles */
  var MAP=[["home","Home"],["month","Month"],["filters","Filters"],["card","Time card"],["alert","Alert signup"],["myalerts","My alerts"],["details","Your details"],["settings","Settings"],["location","Choose spa"],["about","About"]];
  var mapEl=document.getElementById("map");
  MAP.forEach(function(m){
    var b=document.createElement("button"); b.textContent=m[1]; b.dataset.v=m[0];
    b.addEventListener("click",function(){ if(m[0]==="card"&&!S.time) S.time="2:00 PM"; go(m[0]); });
    mapEl.appendChild(b);
  });
  var modeBtn=document.createElement("button"); modeBtn.className="util"; modeBtn.textContent="Phone / Web";
  modeBtn.addEventListener("click",function(){ S.mode=S.mode==="phone"?"web":"phone"; render(); });
  mapEl.appendChild(modeBtn);
  var thm=document.createElement("button"); thm.textContent="Light / dark"; thm.className="util";
  thm.addEventListener("click",function(){ var r=document.documentElement,c=r.dataset.theme;
    if(!c) c=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";
    r.dataset.theme=c==="dark"?"light":"dark"; });
  mapEl.appendChild(thm);
  function highlightMap(){ mapEl.querySelectorAll("button[data-v]").forEach(function(b){ b.classList.toggle("on",b.dataset.v===S.view); }); }

  render();
</script>
